services:
  postgres:
    image: postgres:16-alpine
    container_name: darkkitchen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: darkkitchen
      POSTGRES_USER: darkkitchen
      POSTGRES_PASSWORD: darkkitchen
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - darkkitchen_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darkkitchen -d darkkitchen"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  darkkitchen_postgres_data:
